name: Build TNTChallenge Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Bisa trigger manual dari GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -f TNTChallenge/pom.xml

      - name: Upload .jar sebagai artifact
        uses: actions/upload-artifact@v3
        with:
          name: TNTChallenge-plugin
          path: TNTChallenge/output/TNTChallenge-1.0.0.jar

